services:
  api:
    build: .
    env_file:
      - .env.example
    environment:
      DEBUG: "true"
      DB_URL: "sqlite://db.sqlite3"
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./db.sqlite3:/app/db.sqlite3
    command: uvicorn main:app --host 0.0.0.0 --port 8000

