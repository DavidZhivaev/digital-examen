services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: digital_examen
      POSTGRES_USER: digital_examen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DEBUG: "false"
      DB_URL: "postgres://digital_examen:${POSTGRES_PASSWORD}@db:5432/digital_examen"
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./keys:/app/keys:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
